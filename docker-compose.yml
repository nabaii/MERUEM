services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: meruem
      POSTGRES_PASSWORD: meruem_dev_pass
      POSTGRES_DB: meruem
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meruem"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+psycopg://meruem:meruem_dev_pass@postgres:5432/meruem
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./backend:/app
      - raw_data:/app/raw_data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+psycopg://meruem:meruem_dev_pass@postgres:5432/meruem
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./backend:/app
      - raw_data:/app/raw_data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.core.celery_app worker --loglevel=info -Q collection,processing,intelligence,default

  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+psycopg://meruem:meruem_dev_pass@postgres:5432/meruem
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./backend:/app
    depends_on:
      - redis
    command: celery -A app.core.celery_app beat --loglevel=info

  # ── Phase 4: React dashboard ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - api

  # Dev-only: Vite HMR on port 3000 with hot reload (no build step)
  # Use: docker compose --profile dev up frontend-dev
  frontend-dev:
    image: node:20-alpine
    working_dir: /app
    profiles: ["dev"]
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - api
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0"

  # ── Phase 6: Monitoring ───────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.53.0
    profiles: ["monitoring"]
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus

  grafana:
    image: grafana/grafana:10.4.0
    profiles: ["monitoring"]
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=meruem_grafana_dev
      - GF_ANALYTICS_REPORTING_ENABLED=false
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus

volumes:
  postgres_data:
  raw_data:
  prometheus_data:
  grafana_data:
